display:
  revision: "A"              # "A" for Turing 3.5" hardware, "SIMU" for testing
  com_port: "AUTO"           # Serial port or "AUTO" for auto-detection
  width: 320                 # Display width in pixels
  height: 480                # Display height in pixels
  orientation: "270"         # PORTRAIT / LANDSCAPE / REVERSE_PORTRAIT / REVERSE_LANDSCAPE (or 0/90/180/270)
  brightness: 25             # 0-100

clock:
  font: "turing-smart-screen-python/res/fonts/roboto/Roboto-Bold.ttf"
  font_size: 0               # 0 = auto-fit to screen size
  color: "#FFFFFF"
  background_color: "#000000"
  # background_image: "turing-smart-screen-python/res/backgrounds/example_320x480.png"
  format: "%H:%M"            # strftime format — use "%H:%M:%S" to show seconds
  position: "center"         # center, top, or bottom
  stroke_width: 0            # outline thickness in pixels (0 = disabled)
  stroke_color: "#000000"    # outline color

notifications:
  display_duration: 8        # Seconds to show notification before returning to clock
  icon_size: 64              # App icon size in pixels (square)
  font: "turing-smart-screen-python/res/fonts/roboto/Roboto-Bold.ttf"
  title_font_size: 20
  body_font_size: 16
  text_color: "#FFFFFF"
  background_color: "#1a1a2e"
  # background_image: "turing-smart-screen-python/res/backgrounds/example_320x480.png"
  overlay_clock: true                    # Show a small clock during notification display
  overlay_clock_position: "bottom-right" # bottom-right, bottom-left, top-right, top-left
  overlay_clock_font_size: 20            # Font size in pixels
  overlay_clock_color: "#FFFFFF"         # Text color
  overlay_clock_format: "%H:%M"          # strftime format
